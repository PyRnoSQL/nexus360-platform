<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Test</title>
    <style>
        body { font-family: Arial; background: #0A192F; color: white; padding: 20px; }
        .dashboard { margin-bottom: 30px; border: 1px solid #ffc305; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 500px; border: none; }
        .success { color: #4ade80; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <h1>Dashboard Test Page</h1>
    <p>Testing if Looker Studio embeds work correctly</p>
    
    <div class="dashboard">
        <h3>Executive Dashboard Test</h3>
        <iframe 
            src="https://lookerstudio.google.com/embed/reporting/7bdba7fa-9b0e-4296-a5fd-b603b78ef6c1/page/dvotF"
            allowfullscreen
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-storage-access-by-user-activation"
        ></iframe>
    </div>
    
    <div class="dashboard">
        <h3>Finance Dashboard Test</h3>
        <iframe 
            src="https://lookerstudio.google.com/embed/reporting/7bdba7fa-9b0e-4296-a5fd-b603b78ef6c1/page/p_m9sh8rbb2d"
            allowfullscreen
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-storage-access-by-user-activation"
        ></iframe>
    </div>
    
    <p class="success">If you see the dashboards above, the URLs work correctly.</p>
    <p class="error">If you don't see dashboards, there may be a permission or network issue.</p>
</body>
</html>
